<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
body {
    font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #FFFFFF;
    color: #0A0A0A;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}

@page {
    size: 1280px 720px;
    margin: 0;
}
.slide-page {
    width: 1280px;
    height: 720px;
    position: relative;
    overflow: hidden;
    page-break-after: always;
    background: #FFFFFF;
}

</style>
</head>
<body>
<div class="slide-page">
<!-- Title Slide -->
<div style="position:absolute; left:96px; top:0; width:680px; height:100%; display:flex; flex-direction:column; justify-content:center;">
    
    <h1 style="font-family:'Noto Serif SC',serif; font-size:48px; font-weight:700; line-height:1.3; color:#0A0A0A; letter-spacing:-0.02em;">Full Deck</h1>
    <p style="font-size:18px; font-weight:400; color:#A3A3A3; margin-top:20px; line-height:1.6;">Complete test</p>
</div>
<!-- Thick vertical divider -->
<div style="position:absolute; left:800px; top:80px; width:4px; height:560px; background:#0A0A0A; border-radius:2px;"></div>
<!-- Right info panel -->
<div style="position:absolute; left:840px; top:0; width:360px; height:100%; display:flex; flex-direction:column; justify-content:center;">
    <p style="font-size:15px; color:#A3A3A3; margin-bottom:8px;">Author Name</p>
    <p style="font-size:14px; color:#A3A3A3; margin-bottom:8px;">2026-06-15</p>
    <p style="font-size:14px; color:#A3A3A3; margin-bottom:8px;">Version v3.1</p>
    <p style="font-size:14px; color:#8B1E1E; font-weight:500;">Engineers</p>
</div>
</div>
</body>
</html>
